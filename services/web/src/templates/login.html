<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — OpenRing</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { width: 100%; max-width: 360px; }
    .login-box h1 { text-align: center; margin-bottom: 1.5rem; }
    .login-box .brand-line { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>OpenRing 🐟</h1>
    <p class="brand-line">Pond wildlife deterrent system</p>

    {% if error %}
    <div class="alert alert-err">{{ error }}</div>
    {% endif %}

    <div class="card">
      <form method="post" action="/login">
        <input type="hidden" name="_csrf_token" value="{{ request.state.csrf_token }}">
        <input type="hidden" name="next" value="{{ next }}">

        <div class="field-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username"
                 autofocus required>
        </div>
        <div class="field-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password"
                 required>
        </div>

        <button type="submit" style="width:100%;margin-top:0.5rem;">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>
