{% extends "base.html" %}
{% block title %}Logs — OpenRing{% endblock %}
{% block content %}
<h1>Service Logs</h1>
<p class="hint">Live log tail from running containers via log-streamer sidecar.</p>

<div class="log-toolbar">

  <div class="log-toolbar-group">
    <label for="svc-select">Service</label>
    <div class="log-svc-btns">
      {% for svc in services %}
      <button class="log-svc-btn {% if loop.first %}active{% endif %}"
              data-service="{{ svc }}" onclick="selectService('{{ svc }}', this)">
        {{ svc }}
      </button>
      {% endfor %}
    </div>
  </div>

  <div class="log-toolbar-group">
    <label for="level-filter">Level</label>
    <select id="level-filter" onchange="applyFilter()">
      <option value="all">All</option>
      <option value="debug">Debug+</option>
      <option value="info">Info+</option>
      <option value="warning">Warning+</option>
      <option value="error">Error only</option>
    </select>
  </div>

  <div class="log-toolbar-group">
    <label for="tail-lines">Tail</label>
    <select id="tail-lines" onchange="reconnect()">
      <option value="200">200 lines</option>
      <option value="500" selected>500 lines</option>
      <option value="1000">1000 lines</option>
      <option value="2000">2000 lines</option>
    </select>
  </div>

  <div class="log-toolbar-right">
    <label class="toggle-label" title="Scroll to bottom as new lines arrive">
      <input type="checkbox" id="autoscroll-toggle" checked onchange="onAutoScrollChange()">
      <span class="toggle-track"></span>
      Auto-scroll
    </label>
    <button class="btn-secondary" id="pause-btn" onclick="togglePause()">Pause</button>
    <button class="btn-secondary" onclick="clearLog()">Clear</button>
  </div>

</div>

<div class="log-status-bar">
  <span id="log-status" class="log-status-text">Connecting…</span>
  <span id="log-line-count" class="log-line-count"></span>
</div>

<div class="log-output" id="log-output" data-filter="all"></div>

<script>
let _es = null;
let _paused = false;
let _lineCount = 0;
let _currentService = "{{ services[0] }}";
const MAX_LINES = 3000;

function selectService(svc, btn) {
  document.querySelectorAll(".log-svc-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  _currentService = svc;
  reconnect();
}

function reconnect() {
  if (_es) { _es.close(); _es = null; }
  _paused = false;
  document.getElementById("pause-btn").textContent = "Pause";
  clearLog();
  startStream();
}

function startStream() {
  const tail = document.getElementById("tail-lines").value;
  const url = `/admin/logs/stream?service=${_currentService}&tail=${tail}`;
  setStatus("Connecting…", "muted");

  _es = new EventSource(url);

  _es.onopen = () => setStatus(`Streaming ${_currentService}`, "ok");

  _es.onmessage = (e) => {
    if (_paused) return;
    appendLine(e.data);
  };

  _es.onerror = () => {
    setStatus("Connection lost — retrying…", "warn");
  };
}

function formatCaddyJson(line) {
  // Convert Caddy JSON log lines to a human-readable format
  if (!line.trimStart().startsWith("{")) return null;
  try {
    var obj = JSON.parse(line);
    if (!obj.level && !obj.msg) return null;
    var ts = obj.ts ? new Date(obj.ts * 1000).toISOString().replace("T", " ").replace("Z", "") : "";
    var level = (obj.level || "info").toUpperCase().padEnd(5);
    var msg = obj.msg || "";
    var parts = [ts, level, msg].filter(Boolean);
    // Append useful fields (skip ts, level, msg, logger which are already shown)
    var skip = new Set(["ts", "level", "msg", "logger"]);
    Object.keys(obj).forEach(function(k) {
      if (!skip.has(k)) {
        var v = typeof obj[k] === "object" ? JSON.stringify(obj[k]) : String(obj[k]);
        parts.push(k + "=" + v);
      }
    });
    return parts.join("  ");
  } catch (_) { return null; }
}

function appendLine(text) {
  const box = document.getElementById("log-output");
  const level = detectLevel(text);

  // Format Caddy JSON lines into readable text
  var display = (_currentService === "caddy") ? formatCaddyJson(text) || text : text;

  const div = document.createElement("div");
  div.className = `log-line log-${level}`;
  div.textContent = display;
  box.appendChild(div);
  _lineCount++;

  // Trim oldest lines to stay under MAX_LINES
  while (box.children.length > MAX_LINES) {
    box.removeChild(box.firstChild);
  }

  document.getElementById("log-line-count").textContent = `${box.children.length} lines`;

  if (document.getElementById("autoscroll-toggle").checked) {
    box.scrollTop = box.scrollHeight;
  }
}

function detectLevel(line) {
  // Caddy outputs JSON logs with "level":"error" — try parsing first
  if (line.trimStart().startsWith("{")) {
    try {
      var obj = JSON.parse(line);
      if (obj.level) {
        var l = obj.level.toLowerCase();
        if (l === "error" || l === "fatal" || l === "panic") return "error";
        if (l === "warn") return "warning";
        if (l === "debug") return "debug";
        return "info";
      }
    } catch (_) { /* not JSON, fall through */ }
  }
  const u = line.toUpperCase();
  if (u.includes("CRITICAL") || u.includes("ERROR") || u.includes("EXCEPTION") || u.includes("TRACEBACK")) return "error";
  if (u.includes("WARNING") || u.includes("WARN")) return "warning";
  if (u.includes("DEBUG")) return "debug";
  return "info";
}

// CSS-class-based filter — hides lines by level without removing them from DOM
function applyFilter() {
  const filter = document.getElementById("level-filter").value;
  document.getElementById("log-output").dataset.filter = filter;
  // Re-scroll to bottom after filter change
  if (document.getElementById("autoscroll-toggle").checked) {
    const box = document.getElementById("log-output");
    box.scrollTop = box.scrollHeight;
  }
}

function togglePause() {
  _paused = !_paused;
  const btn = document.getElementById("pause-btn");
  btn.textContent = _paused ? "Resume" : "Pause";
  if (!_paused && document.getElementById("autoscroll-toggle").checked) {
    document.getElementById("log-output").scrollTop = document.getElementById("log-output").scrollHeight;
  }
}

function onAutoScrollChange() {
  if (document.getElementById("autoscroll-toggle").checked) {
    const box = document.getElementById("log-output");
    box.scrollTop = box.scrollHeight;
  }
}

function clearLog() {
  document.getElementById("log-output").innerHTML = "";
  _lineCount = 0;
  document.getElementById("log-line-count").textContent = "";
}

function setStatus(msg, style) {
  const el = document.getElementById("log-status");
  el.textContent = msg;
  el.className = "log-status-text " + (style || "");
}

// Start streaming the first service on page load
startStream();
</script>

<style>
.hint { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.25rem; }

/* ── Toolbar ──────────────────────────────────────────────────────────────── */
.log-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 1.25rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.875rem 1.25rem;
  margin-bottom: 0.5rem;
}
.log-toolbar-group { display: flex; flex-direction: column; gap: 0.3rem; }
.log-toolbar-group label { font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
.log-toolbar-right { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }

/* ── Service buttons ──────────────────────────────────────────────────────── */
.log-svc-btns { display: flex; gap: 0.4rem; }
.log-svc-btn {
  padding: 0.25rem 0.75rem;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--muted);
  font-size: 0.85rem;
  cursor: pointer;
  font-family: var(--mono);
}
.log-svc-btn:hover { color: var(--text); border-color: var(--accent); }
.log-svc-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

/* ── Status bar ──────────────────────────────────────────────────────────── */
.log-status-bar {
  display: flex;
  justify-content: space-between;
  font-size: 0.8rem;
  padding: 0.25rem 0.25rem 0.5rem;
}
.log-status-text { color: var(--muted); }
.log-status-text.ok   { color: var(--ok); }
.log-status-text.warn { color: var(--warn); }
.log-line-count { color: var(--muted); }

/* ── Log output ──────────────────────────────────────────────────────────── */
.log-output {
  background: #0a0c12;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0.75rem 1rem;
  height: 60vh;
  overflow-y: scroll;
  font-family: var(--mono);
  font-size: 0.8rem;
  line-height: 1.6;
}

.log-line { white-space: pre-wrap; word-break: break-all; padding: 1px 0; }
.log-error   { color: var(--danger); }
.log-warning { color: var(--warn); }
.log-debug   { color: var(--muted); }
.log-info    { color: var(--text); }

/* Level filter — CSS-driven visibility */
.log-output[data-filter="info"]    .log-debug   { display: none; }
.log-output[data-filter="warning"] .log-debug,
.log-output[data-filter="warning"] .log-info    { display: none; }
.log-output[data-filter="error"]   .log-debug,
.log-output[data-filter="error"]   .log-info,
.log-output[data-filter="error"]   .log-warning { display: none; }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn-secondary {
  padding: 0.3rem 0.75rem;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.85rem;
  cursor: pointer;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
</style>
{% endblock %}
