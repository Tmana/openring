name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────
  # Ruff is a static analyser — no service deps need to be installed.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: Ruff check
        run: |
          ruff check \
            services/detector/src \
            services/web/src \
            services/notifier/src \
            services/doorbell-firmware/src \
            shared

  # ── Shellcheck (Pi-side installer) ─────────────────────────────────────
  shellcheck:
    name: Shellcheck (pi-setup.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: shellcheck
        run: shellcheck services/doorbell-firmware/pi-setup.sh
      - name: bash -n syntax check
        run: bash -n services/doorbell-firmware/pi-setup.sh
      - name: --help works
        run: bash services/doorbell-firmware/pi-setup.sh --help
      - name: --dry-run with valid args
        run: bash services/doorbell-firmware/pi-setup.sh --dry-run --host-url https://openring.test --device-id front-door
      - name: rejects bad device-id
        run: |
          set +e
          bash services/doorbell-firmware/pi-setup.sh --dry-run --host-url https://h --device-id "Bad ID"
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "expected nonzero exit on bad device-id, got 0"
            exit 1
          fi

  # ── Type check ──────────────────────────────────────────────────────────
  # Detector is excluded — it imports torch / opencv / ultralytics which
  # are only present on the inference image.
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          pip install mypy types-PyYAML types-requests types-redis \
            -r services/web/requirements.txt \
            -r services/notifier/requirements.txt \
            -r services/doorbell-firmware/requirements.txt
      - name: mypy — web
        env:
          MYPYPATH: services/web/src:shared
        run: |
          mypy services/web/src shared \
            --ignore-missing-imports --explicit-package-bases
      - name: mypy — notifier
        env:
          MYPYPATH: services/notifier/src:shared
        run: |
          mypy services/notifier/src shared \
            --ignore-missing-imports --explicit-package-bases
      - name: mypy — doorbell-firmware
        env:
          MYPYPATH: services/doorbell-firmware/src:shared
        run: |
          mypy services/doorbell-firmware/src shared \
            --ignore-missing-imports --explicit-package-bases

  # ── Tests — web ─────────────────────────────────────────────────────────
  test-web:
    name: Tests — web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r services/web/requirements.txt pytest httpx
      - name: pytest
        env:
          PYTHONPATH: services/web/src:shared
        run: pytest services/web/tests/ -v

  # ── Tests — notifier ────────────────────────────────────────────────────
  test-notifier:
    name: Tests — notifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r services/notifier/requirements.txt pytest
      - name: pytest
        env:
          PYTHONPATH: services/notifier/src:shared
        run: pytest services/notifier/tests/ -v

  # ── Tests — doorbell-firmware ───────────────────────────────────────────
  test-doorbell-firmware:
    name: Tests — doorbell-firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r services/doorbell-firmware/requirements.txt pytest
      - name: pytest
        env:
          PYTHONPATH: services/doorbell-firmware/src
        run: pytest services/doorbell-firmware/tests -v
