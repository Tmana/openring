name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ── Lint ────────────────────────────────────────────────────────────────
  # Ruff is a static analyser — no service deps need to be installed.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: Ruff check
        run: |
          ruff check \
            services/detector/src \
            services/web/src \
            services/notifier/src \
            services/doorbell-firmware/src \
            services/clipper/src \
            services/recognizer/src services/recognizer/tests \
            shared

  # ── Shellcheck (installers) ────────────────────────────────────────────
  shellcheck:
    name: Shellcheck (setup.sh + pi-setup.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: shellcheck — pi-setup.sh
        run: shellcheck services/doorbell-firmware/pi-setup.sh
      - name: shellcheck — setup.sh
        run: shellcheck setup.sh
      - name: shellcheck — tests/smoke/run.sh
        run: shellcheck tests/smoke/run.sh
      - name: bash -n syntax check
        run: |
          bash -n setup.sh
          bash -n services/doorbell-firmware/pi-setup.sh
          bash -n tests/smoke/run.sh
      - name: pi-setup.sh --help
        run: bash services/doorbell-firmware/pi-setup.sh --help
      - name: pi-setup.sh --dry-run
        run: bash services/doorbell-firmware/pi-setup.sh --dry-run --host-url https://openring.test --device-id front-door
      - name: pi-setup.sh rejects bad device-id
        run: |
          set +e
          bash services/doorbell-firmware/pi-setup.sh --dry-run --host-url https://h --device-id "Bad ID"
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "expected nonzero exit on bad device-id, got 0"
            exit 1
          fi
      - name: setup.sh --help
        run: bash setup.sh --help
      - name: setup.sh --dry-run
        # Docker is preinstalled on the GitHub runner, so the prerequisite
        # check passes without the rest of the script touching anything.
        run: bash setup.sh --dry-run

  # ── Type check ──────────────────────────────────────────────────────────
  # Detector is excluded — it imports torch / opencv / ultralytics which
  # are only present on the inference image.
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          pip install mypy types-PyYAML types-requests types-redis \
            -r services/web/requirements.txt \
            -r services/notifier/requirements.txt \
            -r services/doorbell-firmware/requirements.txt \
            -r services/clipper/requirements.txt
      - name: mypy — web
        env:
          MYPYPATH: services/web/src:shared
        run: |
          mypy services/web/src shared \
            --ignore-missing-imports --explicit-package-bases
      - name: mypy — notifier
        env:
          MYPYPATH: services/notifier/src:shared
        run: |
          mypy services/notifier/src shared \
            --ignore-missing-imports --explicit-package-bases
      - name: mypy — doorbell-firmware
        env:
          MYPYPATH: services/doorbell-firmware/src:shared
        run: |
          mypy services/doorbell-firmware/src shared \
            --ignore-missing-imports --explicit-package-bases
      - name: mypy — clipper
        env:
          MYPYPATH: services/clipper/src:shared
        run: |
          mypy services/clipper/src shared \
            --ignore-missing-imports --explicit-package-bases
      - name: mypy — recognizer
        env:
          MYPYPATH: services/recognizer/src:shared
        run: |
          mypy services/recognizer/src shared \
            --ignore-missing-imports --explicit-package-bases

  # ── Tests — web ─────────────────────────────────────────────────────────
  test-web:
    name: Tests — web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r services/web/requirements.txt pytest httpx
      - name: pytest
        env:
          PYTHONPATH: services/web/src:shared
        run: pytest services/web/tests/ -v

  # ── Tests — notifier ────────────────────────────────────────────────────
  test-notifier:
    name: Tests — notifier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r services/notifier/requirements.txt pytest
      - name: pytest
        env:
          PYTHONPATH: services/notifier/src:shared
        run: pytest services/notifier/tests/ -v

  # ── Tests — clipper ─────────────────────────────────────────────────────
  test-clipper:
    name: Tests — clipper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r services/clipper/requirements.txt pytest
      - name: pytest
        env:
          PYTHONPATH: services/clipper/src:shared
        run: pytest services/clipper/tests/ -v

  # ── Tests — recognizer ──────────────────────────────────────────────────
  # Recognizer's full stack needs face_recognition (dlib).  We install
  # only the lightweight deps (numpy, redis, pyyaml, pillow) — the dlib
  # smoke test is gated on `pytest.importorskip` so it skips cleanly.
  test-recognizer:
    name: Tests — recognizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps (no dlib — smoke test importorskips)
        run: pip install numpy redis pyyaml pillow pytest
      - name: pytest
        env:
          PYTHONPATH: services/recognizer/src:shared
        run: pytest services/recognizer/tests/ -v

  # ── Tests — doorbell-firmware ───────────────────────────────────────────
  test-doorbell-firmware:
    name: Tests — doorbell-firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r services/doorbell-firmware/requirements.txt pytest
      - name: pytest
        env:
          PYTHONPATH: services/doorbell-firmware/src
        run: pytest services/doorbell-firmware/tests -v

  # ── Smoke test — host stack end-to-end ──────────────────────────────────
  # Boots redis + web + notifier (skips detector — its image is huge), opens a
  # pairing window, registers a fake device, fires a press, asserts the event
  # row lands in openring.db and that the notifier received it on the bus.
  # See ROADMAP.md issue #12 for the design.
  smoke:
    name: Smoke (compose up + doorbell press)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install jq (curl + docker preinstalled on the runner)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq
      - name: Run the smoke test
        env:
          SMOKE_DEBUG: "1"     # dump container logs on failure
        run: ./tests/smoke/run.sh
      - name: Upload setup/build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            /tmp/openring-setup.log
            /tmp/openring-build.log
            /tmp/openring-up.log
          if-no-files-found: ignore
