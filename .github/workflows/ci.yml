name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: Ruff check
        # NOTE: until ROADMAP issue #2 ports the host services in,
        # only the doorbell-firmware tree exists.
        run: |
          ruff check services/doorbell-firmware/src

  test-doorbell-firmware:
    name: Tests — doorbell-firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r services/doorbell-firmware/requirements.txt pytest
      - name: pytest
        env:
          PYTHONPATH: services/doorbell-firmware/src
        run: pytest services/doorbell-firmware/tests -v
