# OpenRing example config.
#
# Copy to /var/lib/openring-config/openring.yml (the named Docker volume)
# during host setup. setup.sh does this for you.
#
# Secrets in this file are kept in plaintext on the host's data
# directory; for production deployments, OpenRing v0.2+ will support
# the same envelope-encrypted secrets pattern ScarGuard uses.

system:
  log_level: info
  timezone: "America/Los_Angeles"
  retention_days: 30          # snapshots, clips, events older than this are pruned (labeled events kept)
  stats_interval: 5            # seconds between system-stats samples
  base_url: "https://openring.local"   # external URL used in notification deep-links

# Doorbell devices the host trusts. Populated by the pairing flow
# (POST /api/doorbell/register from a fresh Pi during the 5-minute
# pairing window opened from the web UI). You usually won't edit this
# by hand.
doorbells:
  - device_id: front-door
    label: "Front door"
    # token is hashed and stored in auth.db, not here
    heartbeat_timeout_seconds: 90

# Camera streams (RTSP from each doorbell, plus optionally any
# standalone IP cameras you also want OpenRing to watch).
cameras:
  - name: front-door
    rtsp_url: "rtsp://openring:CHANGE_ME@openring-doorbell.local:8554/door"
    enabled: true
    resolution: 720

    # Exclusion zones suppress detections whose bbox center falls inside
    # the zone.  Coordinates are NORMALIZED to the frame: x=0,y=0 is the
    # top-left, x=1,y=1 is the bottom-right.  w and h are also fractions
    # of the frame, NOT pixel counts.
    #
    # The web UI's Cameras → Exclusion zones canvas is the friendliest
    # way to draw these — it shows your live frame with overlay rectangles
    # you can click-and-drag.  The values below are example starting
    # points for a typical American suburban porch.
    exclusion_zones:
      - x: 0.00            # bottom strip — public sidewalk in front of the house
        y: 0.85            #   suppresses pedestrians passing by who never approach
        w: 1.00
        h: 0.15
        label: "sidewalk"
      # Uncomment + tune for your install:
      # - x: 0.78            # right edge — neighbor's window across the property line
      #   y: 0.10
      #   w: 0.22
      #   h: 0.55
      #   label: "neighbor window"
      # - x: 0.40            # the inflatable Halloween skeleton on the porch
      #   y: 0.55            #   that YOLO keeps re-detecting every cooldown_seconds
      #   w: 0.20
      #   h: 0.30
      #   label: "halloween decoy"

    # Per-camera rules for which channels each detected class fires.
    # First-match-wins; "*" is the catch-all.  Empty channels=[] means
    # "log the event but suppress notifications" — useful for classes
    # you want in the events page but not on your phone (delivery
    # drivers tagged later, dogs walking by, etc.).
    notification_rules:
      - class_name: doorbell_press        # someone actually pressed the button
        channels: [phone-ntfy, owner-email]
      - class_name: person                # YOLO detected a person on the porch
        channels: [phone-ntfy]
      - class_name: "*"                   # everything else (dogs, cats, raccoons)
        channels: [phone-ntfy]

detection:
  model_path: /models/yolov8n.pt
  confidence_threshold: 0.40
  target_classes:
    - person
  cooldown_seconds: 30
  frame_skip: 2

notifications:
  channels:
    - name: phone-ntfy
      type: ntfy
      server: "https://ntfy.sh"
      topic: "openring-CHANGE_ME"      # use a long random topic; this URL is unauthenticated
      priority: 4
      include_snapshot: true
      enabled: true
    - name: owner-email
      type: email
      smtp_host: "smtp.example.com"
      smtp_port: 587
      smtp_user: "you@example.com"
      smtp_pass: "CHANGE_ME"
      from_addr: "openring@example.com"
      to_addrs: ["you@example.com"]
      enabled: false

# v0.2: video clips.  Optional sidecar service writes 5s pre-roll + 5s
# post-roll MP4 clips for every qualifying detection / doorbell press.
# Safest defaults:
#   * enabled: false        — opt-in.  When on, the segmenter spawns
#                              one ffmpeg subprocess per enabled camera,
#                              ~few % CPU and ~0.5 GB disk per camera
#                              at 30 segments × 1s × typical H.264 bitrate.
#   * trigger_classes:      — narrow this to the events you want clips
#                              for; the default already excludes
#                              noise-class detections.
clipper:
  enabled: false
  pre_roll_seconds: 5.0
  post_roll_seconds: 5.0
  segment_seconds: 1                # MPEG-TS segment granularity
  segments_per_camera: 30           # ring depth (~30s of history)
  trigger_classes: [person, doorbell_press]
  min_confidence: 0.40
  max_concurrent_clips: 4

# v0.4: face recognition.  Opt-in.  Recognizer sidecar runs on-host —
# no network calls of any kind, embeddings live in /data/recognizer.db,
# reference photos in /data/face-references/.  See docs/FACE_RECOGNITION.md.
#
# Two user-visible outcomes wired through the `rules` block (consumed by
# the notifier in v0.4 PR-C):
#   * suppression — `channels: []` for a label, e.g. household members
#     get logged but not paged.
#   * escalation — multi-channel set including a webhook your auto-call
#     provider listens on.
#
# Special labels:
#   "*"        any matched-known face (fallback when no specific rule)
#   "unknown"  a face was detected but did not match any enrolled face
#
# Empty `rules` (or face_recognition.enabled: false) preserves v0.1
# behavior — every event flows through the per-camera notification_rules
# above.
face_recognition:
  enabled: false
  trigger_classes: [person]
  min_confidence: 0.40
  bbox_padding_pct: 0.20            # widen YOLO bbox before face detection
  tolerance: 0.6                    # face_recognition lib distance; lower = stricter
  max_concurrent_workers: 2
  rules: []
  # Examples — uncomment + edit when you've enrolled faces in the web UI:
  # rules:
  #   - label: "Sarah"             # household — quiet, just log
  #     channels: []
  #   - label: "ex-roommate"       # escalate — multi-channel + auto-call hook
  #     channels: [phone-ntfy, owner-email, panic-webhook]
  #     priority: high
  #   - label: "unknown"           # default for strangers
  #     channels: [phone-ntfy]
  #   - label: "*"                 # any-known fallback
  #     channels: [phone-ntfy]

tls:
  mode: "off"                       # off (LAN-only) | auto (Let's Encrypt) | manual
  domain: ""

redis:
  host: redis
  port: 6379
