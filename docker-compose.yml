name: openring

# OpenRing host stack.
#
# Image names assume you build locally for now (`docker compose build`).
# Once we publish to GHCR, set GHCR_OWNER in a .env file.

services:

  # ── Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    user: "999:999"
    restart: unless-stopped
    command: >-
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory 200mb --maxmemory-policy allkeys-lru;
      else
        exec redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DETECTION_HMAC_KEY: ${DETECTION_HMAC_KEY:-}
    healthcheck:
      test: >-
        sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
          redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping;
        else
          redis-cli ping;
        fi'
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - openring-redis:/data
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]

  # ── Caddy reverse proxy ──────────────────────────────────────────────
  caddy:
    build:
      context: .
      dockerfile: services/caddy/Dockerfile
    image: openring-caddy:${IMAGE_TAG:-dev}
    user: "999:999"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - openring-caddy:/data
      - openring-config:/config:ro
    environment:
      CONFIG_PATH: /config/openring.yml
      HTTPS_PORT: ${HTTPS_PORT:-443}
      XDG_CONFIG_HOME: /data/caddy/config
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    pids_limit: 100
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]

  # ── Detector ─────────────────────────────────────────────────────────
  # GPU support requires the NVIDIA Container Runtime on the host.
  # For CPU-only inference (the typical home-server case) the default
  # image works as-is.
  detector:
    build:
      context: .
      dockerfile: services/detector/Dockerfile
    image: openring-detector:${IMAGE_TAG:-dev}
    environment:
      CONFIG_PATH: /config/openring.yml
      SNAPSHOT_DIR: /data/snapshots
      CLIPS_DIR: /data/clips
      DB_PATH: /data/openring.db
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DETECTION_HMAC_KEY: ${DETECTION_HMAC_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/healthy -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - openring-config:/config:ro
      - openring-models:/models:ro
      - openring-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 3g
    cpus: 4.0
    pids_limit: 200
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, DAC_OVERRIDE, SETUID, SETGID]

  # ── Web UI ───────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    image: openring-web:${IMAGE_TAG:-dev}
    environment:
      CONFIG_PATH: /config/openring.yml
      SNAPSHOT_DIR: /data/snapshots
      CLIPS_DIR: /data/clips
      MODELS_DIR: /models
      DB_PATH: /data/openring.db
      AUTH_DB_PATH: /data/auth.db
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DETECTION_HMAC_KEY: ${DETECTION_HMAC_KEY:-}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - openring-config:/config
      - openring-models:/models
      - openring-data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 200
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, DAC_OVERRIDE, SETUID, SETGID]

  # ── Clipper (sidecar) ───────────────────────────────────────────────
  # v0.2: per-camera ffmpeg segmenter + on-event MP4 writer.  Optional —
  # opt-in via clipper.enabled in openring.yml.  Mounts /data:rw so it
  # can write clips and the clips-table row in openring.db.
  clipper:
    build:
      context: .
      dockerfile: services/clipper/Dockerfile
    image: openring-clipper:${IMAGE_TAG:-dev}
    environment:
      CONFIG_PATH: /config/openring.yml
      DB_PATH: /data/openring.db
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DETECTION_HMAC_KEY: ${DETECTION_HMAC_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/healthy -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - openring-config:/config:ro
      - openring-data:/data
      - openring-clipper:/var/lib/openring  # ring buffer (segments)
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 200
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, DAC_OVERRIDE, SETUID, SETGID]

  # ── Notifier ─────────────────────────────────────────────────────────
  notifier:
    build:
      context: .
      dockerfile: services/notifier/Dockerfile
    image: openring-notifier:${IMAGE_TAG:-dev}
    environment:
      CONFIG_PATH: /config/openring.yml
      NOTIFIER_STATE_DIR: /var/lib/openring
      DB_PATH: /data/openring.db
      SNAPSHOT_DIR: /data/snapshots
      MODELS_DIR: /models
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DETECTION_HMAC_KEY: ${DETECTION_HMAC_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/healthy -mmin -1 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - openring-config:/config:ro
      - openring-models:/models:ro
      - openring-data:/data:ro
      - openring-notifier:/var/lib/openring
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    cap_add: [CHOWN, FOWNER, DAC_OVERRIDE, SETUID, SETGID]
    read_only: true
    tmpfs:
      - /tmp:size=64m

volumes:
  openring-config:
    name: openring-config
  openring-data:
    name: openring-data
  openring-models:
    name: openring-models
  openring-redis:
    name: openring-redis
  openring-caddy:
    name: openring-caddy
  openring-notifier:
    name: openring-notifier
  openring-clipper:
    name: openring-clipper
